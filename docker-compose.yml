# ============================================================
# AKShare Gateway — Docker Compose
# ============================================================
# 独立部署的 akshare 数据网关
# 端口: 9898
# ============================================================

services:
  akshare-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: akshare-gateway:latest
    container_name: akshare-gateway
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      TZ: Asia/Shanghai
    ports:
      - "9898:9898"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9898/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
